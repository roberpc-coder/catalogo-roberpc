<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Catálogo ROBER®PC</title>
    <link rel="icon" href="imagenes/icono.ico" type="image/x-icon" />
    <link rel="stylesheet" href="styles.css" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    />
  </head>
  <body>
    <div class="header">
      <div class="title-search-container">
        <div class="title-section">
          <i class="fas fa-gamepad"></i>
          <h1>Catálogo ROBER®PC</h1>
        </div>
        <div class="search-section">
          <!-- Buscador principal -->
          <input
            type="text"
            id="searchInput"
            placeholder="Buscar..."
            aria-label="Buscar juegos"
          />

          <!-- Selector de plataforma más pequeño -->
          <select id="platformSelect" style="max-width: 120px">
            <option value="all">Todo</option>
            <option value="PC">PC</option>
            <option value="PC Online">Online</option>
            <option value="Nintendo Switch">Switch</option>
            <option value="PS5">PS5</option>
          </select>

          <!-- Botón Estrenos sin icono y más corto -->
          <a href="estrenos.html" class="estrenos-btn">Estrenos</a>

          <!-- El carrito se mantiene -->
          <a href="carrito.html" class="cart-btn">
            <i class="fas fa-shopping-cart"></i>
            <span class="cart-count">0</span>
          </a>
        </div>
      </div>
    </div>

    <div class="catalog-container" id="gameCatalog"></div>

    <script src="index.js"></script>
  </body>
</html>
